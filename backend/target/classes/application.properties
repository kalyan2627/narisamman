# Server
server.port=9090

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/narisamman_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.narisamman=DEBUG
logging.level.org.springframework.web=INFO

# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
twilio.auth.token=${TWILIO_AUTH_TOKEN:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
twilio.verify.sid=${TWILIO_VERIFY_SID:VAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}

# Mail Configuration
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}
app.jwt.expiration-ms=86400000

# Admin Configuration
admin.email=${ADMIN_EMAIL:admin@narisamman.in}
admin.password.hash=${ADMIN_PASSWORD_HASH:$2a$12$b6P4D66Tj2J4dZ0rQ/L42Ob/iC4Vv1V9731C2Gv6L9xZ0t5Yf5Uqy}

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:8081,http://10.188.242.2:8081,http://10.188.242.2:8086}
